<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.2/aframe/build/aframe-ar.js"></script>
        <script src="https://unpkg.com/aframe-gps-entity-place@latest/dist/aframe-gps-entity-place.min.js"></script>
        <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
        
        <style>
            #music-button {
                position: absolute;
                bottom: 30px; 
                left: 50%; 
                transform: translateX(-50%); 
                z-index: 9999; 
                background: rgba(255, 255, 255, 0.15); 
                backdrop-filter: blur(8px); 
                -webkit-backdrop-filter: blur(8px); 
                border: 1px solid rgba(255, 255, 255, 0.3); 
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
                color: white;
                border-radius: 30px; 
                padding: 15px 40px;
                font-size: 18px;
                font-family: sans-serif;
                text-transform: uppercase; 
                letter-spacing: 2px; 
                cursor: pointer;
                outline: none;
                transition: background 0.3s; 
            }
            
            #music-button:active {
                background: rgba(255, 255, 255, 0.3);
            }
        </style>
    </head>

    <body style="margin: 0; overflow: hidden;">
        
        <button id="music-button">music</button>

        <a-scene
            renderer="logarithmicDepthBuffer: true;"
            embedded
            loading-screen="enabled: false;"
            arjs="sourceType: webcam; debugUIEnabled: false;"
        >
            <a-assets>
                <a-asset-item id="cow-model" src="cow_dance.glb"></a-asset-item>
                <a-asset-item id="grass-model" src="realistics_grass_06.glb"></a-asset-item>
                <audio id="bg-music" src="Sandungueo_sin_freno.mp3" preload="auto" loop="true"></audio>
            </a-assets>

            <!-- ADD LIGHTING HERE -->
            <a-light type="ambient" intensity="1"></a-light>
            <a-light type="directional" intensity="0.5" position="5 10 7"></a-light>

            <a-entity id="ar-group">
                <a-entity gltf-model="#cow-model" scale="1 1 1" position="0 0 0" animation-mixer="clip: *; loop: repeat"></a-entity>
                <a-entity gltf-model="#grass-model" scale="1 1 1" position="0.5 0 0.8" rotation="0 45 0"></a-entity>
                <a-entity gltf-model="#grass-model" scale="1.1 1.1 1.1" position="-0.7 0 1.2" rotation="0 180 0"></a-entity>
                <a-entity gltf-model="#grass-model" scale="0.9 0.9 0.9" position="1.2 0 -0.5" rotation="0 90 0"></a-entity>
                <a-entity gltf-model="#grass-model" scale="1 1 1" position="-1.1 0 -1.1" rotation="0 270 0"></a-entity>
                <a-entity gltf-model="#grass-model" scale="1.2 1.2 1.2" position="0.2 0 -1.4" rotation="0 15 0"></a-entity>
                <a-entity gltf-model="#grass-model" scale="1 1 1" position="-1.5 0 0.3" rotation="0 120 0"></a-entity>
                <a-entity gltf-model="#grass-model" scale="0.8 0.8 0.8" position="1.4 0 1.4" rotation="0 310 0"></a-entity>
            </a-entity>

            <a-camera gps-camera rotation-reader></a-camera>
        </a-scene>

        <script>
            document.getElementById('music-button').addEventListener('click', function() {
                this.style.display = 'none';
                var music = document.getElementById('bg-music');
                music.play();
            });

            window.onload = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            let lat = position.coords.latitude;
                            let lon = position.coords.longitude;
                            let offsetLat = lat + 0.00005; 
                            
                            let arGroup = document.getElementById('ar-group');
                            arGroup.setAttribute('gps-entity-place', `latitude: ${offsetLat}; longitude: ${lon};`);
                            
                            console.log(`定位成功！模型已動態生成於：${offsetLat}, ${lon}`);
                        },
                        (err) => {
                            alert("無法取得 GPS 位置，請確保您已允許瀏覽器存取定位權限！");
                        },
                        {
                            enableHighAccuracy: true,
                            maximumAge: 0,
                            timeout: 10000
                        }
                    );
                } else {
                    alert("您的瀏覽器不支援定位功能。");
                }
            };
        </script>
    </body>
</html>
